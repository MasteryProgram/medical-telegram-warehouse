version: 2

models:
  - name: dim_channels
    description: "One row per Telegram channel with aggregate stats."
    columns:
      - name: channel_key
        tests: [unique, not_null]
      - name: channel_name
        tests: [unique, not_null]
      - name: channel_type
        tests: [not_null]

  - name: dim_dates
    description: "Date dimension covering 2024 onwards."
    columns:
      - name: date_key
        tests: [unique, not_null]
      - name: full_date
        tests: [unique, not_null]

  - name: fct_messages
    description: "One row per message with FK references to dim_channels and dim_dates."
    columns:
      - name: message_id
        tests: [unique, not_null]
      - name: channel_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_channels')
              field: channel_key
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: views
        tests: [not_null]
      - name: forwards
        tests: [not_null]